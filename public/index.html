<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muchikub Multijugador</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #1a6b3a; color: #fff; min-height: 100vh; }
  #app { max-width: 1200px; margin: 0 auto; padding: 16px; }
  h1 { text-align: center; margin-bottom: 20px; font-size: 2rem; }
  .panel { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .topbar { display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .topbar h1 { margin: 0; }
  .audio-btn { padding: 8px 12px; font-size: 0.85rem; }
  input { padding: 10px; border-radius: 8px; border: none; font-size: 1rem; width: 220px; margin-right: 8px; }
  button { padding: 10px 18px; border-radius: 8px; border: none; background: #f0a500; color: #000; font-weight: bold; cursor: pointer; font-size: 0.95rem; margin: 4px; }
  button:hover { background: #ffc940; }
  button:disabled { background: #888; cursor: default; }
  .tile {
    display: inline-flex; align-items: center; justify-content: center;
    width: 42px; height: 52px; border-radius: 6px; background: #f5f0e8;
    font-weight: bold; font-size: 1rem; margin: 3px; cursor: grab;
    border: 2px solid #ccc; user-select: none; position: relative;
  }
  .tile.red { color: #e02020; }
  .tile.blue { color: #1a5fd4; }
  .tile.yellow { color: #c8a000; }
  .tile.black { color: #111; }
  .tile.joker { color: #9b30d0; font-size: 0.8rem; }
  .tile.red { box-shadow: inset 0 -5px 0 #e02020; }
  .tile.blue { box-shadow: inset 0 -5px 0 #1a5fd4; }
  .tile.yellow { box-shadow: inset 0 -5px 0 #c8a000; }
  .tile.black { box-shadow: inset 0 -5px 0 #111; }
  .tile.joker { box-shadow: inset 0 -5px 0 #9b30d0; }
  .tile.selected { border: 3px solid #f0a500; transform: translateY(-6px); }
  .tile.on-board { cursor: pointer; }
  .tile.pop { animation: tilePop 260ms ease-out; }
  #board {
    min-height: 200px; background: rgba(0,0,0,0.2); border-radius: 10px;
    padding: 12px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px;
  }
  .group-on-board {
    background: rgba(255,255,255,0.08); border-radius: 8px; padding: 22px 6px 6px;
    display: flex; flex-wrap: wrap; border: 1px dashed rgba(255,255,255,0.2);
    position: relative; min-width: 96px;
  }
  .group-label {
    position: absolute; top: 4px; left: 8px; font-size: 0.75rem;
    color: #b8ffd2; font-weight: bold;
  }
  #hand { display: flex; flex-wrap: wrap; padding: 10px 0; align-items: center; }
  .hand-separator {
    width: 10px; height: 52px; margin: 3px 5px;
    border-left: 2px solid rgba(255,255,255,0.22);
  }
  .player-info { display: flex; gap: 12px; flex-wrap: wrap; }
  .player-badge {
    background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 14px;
    font-size: 0.9rem;
  }
  .player-badge.active { background: #f0a500; color: #000; font-weight: bold; }
  .player-badge.active { animation: activeGlow 1.4s ease-in-out infinite; }
  .player-badge.offline { opacity: 0.55; border: 1px dashed rgba(255,255,255,0.45); }
  #msg { color: #ffd700; font-weight: bold; margin: 8px 0; min-height: 24px; }
  #link-box { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 12px; word-break: break-all; font-size: 0.9rem; }
  .action-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  #new-group-input { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; }
  #pickedFromBoard {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    min-height: 34px; margin-top: 8px; color: #b8ffd2;
  }
  .tile.lifted { border-color: #00e0a4; transform: translateY(-4px); }
  .turn-glow { box-shadow: 0 0 0 2px rgba(0,224,164,0.35), 0 0 24px rgba(0,224,164,0.35); }
  .timer-options {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    margin: 12px 0 4px;
  }
  .timer-options input[type="checkbox"] { width: auto; margin: 0; }
  .timer-options input[type="number"] { width: 78px; margin: 0; }
  .timer-note { color: #b8ffd2; font-size: 0.85rem; width: 100%; }
  #turnTimer { margin-left: 10px; color: #b8ffd2; font-weight: bold; }
  #turnTimer.warning { color: #ffd700; animation: activeGlow 1s ease-in-out infinite; }
  .shake { animation: shake 360ms ease-in-out; }
  .pulse-board { animation: boardPulse 450ms ease-out; }
  .confetti-piece {
    position: fixed; top: -12px; width: 8px; height: 14px; border-radius: 2px;
    pointer-events: none; z-index: 9999; animation: confettiFall 1.8s linear forwards;
  }
  @keyframes activeGlow {
    0%, 100% { box-shadow: 0 0 0 rgba(240,165,0,0); }
    50% { box-shadow: 0 0 18px rgba(240,165,0,0.55); }
  }
  @keyframes tilePop {
    0% { transform: scale(0.92); }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-3px); }
  }
  @keyframes boardPulse {
    0% { box-shadow: inset 0 0 0 rgba(255,255,255,0); }
    50% { box-shadow: inset 0 0 28px rgba(255,255,255,0.28); }
    100% { box-shadow: inset 0 0 0 rgba(255,255,255,0); }
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <h1>🎲 Muchikub</h1>
    <button id="audioBtn" class="audio-btn" onclick="toggleAudio()">🔇 Audio</button>
  </div>

  <!-- LOBBY -->
  <div id="lobby" class="panel">
    <h2>Entrar al juego</h2><br>
    <input id="nameInput" placeholder="Tu nombre" maxlength="20" />
    <div class="timer-options">
      <label><input id="timerEnabled" type="checkbox"> Tiempo por turno</label>
      <input id="turnMinutes" type="number" min="0" max="15" value="2" aria-label="Minutos">
      <span>min</span>
      <input id="turnSeconds" type="number" min="0" max="59" value="0" aria-label="Segundos">
      <span>seg</span>
      <span class="timer-note">Lo define quien crea la sala y se aplica a todos los jugadores.</span>
    </div>
    <br><br>
    <button onclick="createRoom()">Crear sala</button>
    <span style="margin:0 8px">ó</span>
    <input id="roomInput" placeholder="Código de sala" maxlength="6" style="width:140px;text-transform:uppercase" />
    <button onclick="joinRoom()">Unirse</button>
    <div id="msg-lobby" style="color:#ffd700;margin-top:10px"></div>
  </div>

  <!-- WAITING ROOM -->
  <div id="waiting" class="panel" style="display:none">
    <h2>Sala: <span id="roomCode"></span></h2>
    <p id="waitingTimer" style="margin:8px 0;color:#b8ffd2"></p>
    <p style="margin:8px 0">Compartí este link con tus amigos:</p>
    <div id="link-box"></div>
    <button onclick="copyLink()" style="margin-top:8px">📋 Copiar link</button>
    <br><br>
    <h3>Jugadores conectados:</h3>
    <div id="waitingPlayers" style="margin-top:8px"></div>
    <br>
    <button id="startBtn" onclick="startGame()" style="display:none">▶️ Iniciar juego</button>
    <button onclick="leaveRoom()" style="margin-top:8px">Salir de sala</button>
    <p id="waitMsg" style="color:#adf">Esperando que el host inicie...</p>
  </div>

  <!-- GAME -->
  <div id="game" style="display:none">
    <div class="panel">
      <h3>Jugadores</h3>
      <div id="playersInfo" class="player-info" style="margin-top:8px"></div>
    </div>
    <div class="panel">
      <h3>Mesa <span id="poolCount" style="font-size:0.9rem;color:#b8ffd2;margin-left:12px"></span></h3>
      <div id="board"></div>
    </div>
    <div class="panel">
      <h3>Mis fichas (<span id="handCount">0</span>) — <span id="turnMsg"></span><span id="turnTimer"></span></h3>
      <div id="msg"></div>
      <div id="hand"></div>
      <div id="new-group-input">
        <span>Fichas seleccionadas: <span id="selCount">0</span></span>
        <button onclick="addGroupFromSelected()">➕ Bajar como grupo</button>
        <button onclick="addToExistingGroup()">📌 Agregar a grupo en mesa</button>
        <button onclick="sortHandExpert()">Ordenar mis fichas</button>
        <button onclick="clearSelection()">✖ Deseleccionar</button>
        <button onclick="returnPickedTiles()">Devolver levantadas</button>
        <button onclick="sortBoard()">Ordenar mesa</button>
        <button onclick="leaveRoom()">Salir de sala</button>
      </div>
      <div id="pickedFromBoard"></div>
      <div class="action-bar">
        <button id="confirmBtn" onclick="confirmTurn()">✅ Confirmar turno</button>
        <button id="drawBtn" onclick="drawTile()">🃏 Tomar ficha del pozo</button>
        <button id="cancelBtn" onclick="cancelTurn()">↩ Deshacer</button>
      </div>
    </div>
  </div>
</div>

<script>
const socket = io();
const ROOM_STORAGE_KEY = 'muchikubRoomId';
const PLAYER_STORAGE_KEY = 'muchikubPlayerToken';
let myHand = [];
let myIndex = -1;
let myPlayerId = '';
let myPlayerToken = localStorage.getItem(PLAYER_STORAGE_KEY) || localStorage.getItem('rummikubPlayerToken') || crypto.randomUUID();
let myName = '';
let savedRoomId = localStorage.getItem(ROOM_STORAGE_KEY) || localStorage.getItem('rummikubRoomId') || '';
let invitedRoomId = '';
let currentRoomId = '';
let isMyTurn = false;
let myOpened = false;
let boardGroups = []; // array of arrays of tiles
let boardGroupsBackup = [];
let handBackup = [];
let selectedTiles = [];
let selectedBoardTiles = [];
let usedTileIds = [];
let turnInProgress = false;
let waitingForServer = false;
let audioEnabled = false;
let audioCtx = null;
let musicTimer = null;
let turnEndsAt = null;
let turnDurationSeconds = 0;
let serverTimeOffset = 0;
let timerInterval = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration = 0.08, type = 'sine', volume = 0.05) {
  if (!audioEnabled) return;
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playSound(kind) {
  const sounds = {
    select: () => playTone(520, 0.05, 'triangle', 0.035),
    place: () => { playTone(440, 0.07, 'triangle', 0.045); setTimeout(() => playTone(660, 0.08, 'triangle', 0.04), 60); },
    confirm: () => { playTone(523, 0.08, 'sine', 0.045); setTimeout(() => playTone(784, 0.12, 'sine', 0.04), 90); },
    draw: () => playTone(220, 0.12, 'square', 0.025),
    error: () => { playTone(120, 0.12, 'sawtooth', 0.04); setTimeout(() => playTone(95, 0.1, 'sawtooth', 0.03), 90); },
    win: () => { [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => playTone(f, 0.16, 'triangle', 0.05), i * 120)); }
  };
  if (sounds[kind]) sounds[kind]();
}

function startMusic() {
  if (musicTimer) return;
  const notes = [196, 246.94, 293.66, 246.94, 220, 261.63, 329.63, 261.63];
  let index = 0;
  musicTimer = setInterval(() => {
    if (!audioEnabled) return;
    playTone(notes[index % notes.length], 0.18, 'sine', 0.018);
    index++;
  }, 620);
}

function stopMusic() {
  clearInterval(musicTimer);
  musicTimer = null;
}

function toggleAudio() {
  audioEnabled = !audioEnabled;
  if (audioEnabled) {
    ensureAudio();
    startMusic();
    playSound('confirm');
  } else {
    stopMusic();
  }
  document.getElementById('audioBtn').innerText = audioEnabled ? '🔊 Audio' : '🔇 Audio';
}

// --- URL room detection ---
window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const hasRoomParam = params.has('room');
  const r = (params.get('room') || '').trim().toUpperCase();

  if (hasRoomParam && !r) {
    clearSavedRoom();
    showLobby();
    return;
  }

  if (r) {
    invitedRoomId = r;
    document.getElementById('roomInput').value = invitedRoomId;
    if (savedRoomId !== invitedRoomId) {
      currentRoomId = '';
      showLobby();
    }
  }
};

function createRoom() {
  myName = document.getElementById('nameInput').value.trim();
  if (!myName) return alert('Ingresá tu nombre');
  const turnTimeEnabled = document.getElementById('timerEnabled').checked;
  const turnMinutes = parseInt(document.getElementById('turnMinutes').value, 10) || 0;
  const turnSeconds = parseInt(document.getElementById('turnSeconds').value, 10) || 0;
  socket.emit('createRoom', { playerName: myName, playerToken: myPlayerToken, turnTimeEnabled, turnMinutes, turnSeconds });
}

function joinRoom() {
  myName = document.getElementById('nameInput').value.trim();
  const roomId = document.getElementById('roomInput').value.trim().toUpperCase();
  if (!myName) return alert('Ingresá tu nombre');
  if (!roomId) return alert('Ingresá el código de sala');
  socket.emit('joinRoom', { roomId, playerName: myName, playerToken: myPlayerToken });
}

function startGame() {
  socket.emit('startGame', { roomId: currentRoomId });
}

function copyLink() {
  const link = document.getElementById('link-box').innerText;
  navigator.clipboard.writeText(link).then(() => alert('¡Link copiado!'));
}

function leaveRoom() {
  if (currentRoomId) {
    socket.emit('leaveRoom', { roomId: currentRoomId, playerToken: myPlayerToken });
  }
  clearSavedRoom();
  myHand = [];
  myIndex = -1;
  myPlayerId = '';
  boardGroups = [];
  boardGroupsBackup = [];
  handBackup = [];
  selectedTiles = [];
  selectedBoardTiles = [];
  usedTileIds = [];
  turnInProgress = false;
  waitingForServer = false;
  stopTurnTimer();
  showLobby();
  setMsg('');
}

// --- Socket events ---
function showLobby() {
  document.getElementById('lobby').style.display = 'block';
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('game').style.display = 'none';
}

function clearSavedRoom() {
  localStorage.removeItem(ROOM_STORAGE_KEY);
  localStorage.removeItem('rummikubRoomId');
  savedRoomId = '';
  currentRoomId = '';
}

function persistSession(roomId, playerToken) {
  currentRoomId = roomId;
  savedRoomId = roomId;
  myPlayerToken = playerToken || myPlayerToken;
  localStorage.setItem(ROOM_STORAGE_KEY, currentRoomId);
  localStorage.setItem(PLAYER_STORAGE_KEY, myPlayerToken);
  localStorage.removeItem('rummikubRoomId');
  localStorage.removeItem('rummikubPlayerToken');
}

function restoreSession({ roomId, hand, playerIndex, playerId, playerToken }) {
  currentRoomId = roomId;
  myIndex = playerIndex;
  myPlayerId = playerId;
  persistSession(roomId, playerToken);
  myHand = hand;
}

socket.on('connect', () => {
  const params = new URLSearchParams(window.location.search);
  const hasRoomParam = params.has('room');
  const urlRoom = (params.get('room') || '').trim().toUpperCase();
  const canRejoinSavedRoom = savedRoomId && myPlayerToken && (!hasRoomParam || (urlRoom && urlRoom === savedRoomId));
  if (canRejoinSavedRoom) {
    currentRoomId = savedRoomId;
    socket.emit('rejoinRoom', { roomId: savedRoomId, playerToken: myPlayerToken });
  }
});

socket.on('roomCreated', ({ roomId, hand, playerIndex, playerId, playerToken }) => {
  restoreSession({ roomId, hand, playerIndex, playerId, playerToken });
  showWaiting(roomId, true);
});

socket.on('joinedRoom', ({ roomId, hand, playerIndex, playerId, playerToken }) => {
  restoreSession({ roomId, hand, playerIndex, playerId, playerToken });
  showWaiting(roomId, false);
});

socket.on('rejoinedRoom', ({ roomId, hand, playerIndex, playerId, playerToken }) => {
  restoreSession({ roomId, hand, playerIndex, playerId, playerToken });
  document.getElementById('lobby').style.display = 'none';
  if (document.getElementById('game').style.display !== 'block') {
    document.getElementById('waiting').style.display = 'block';
  }
  setMsg('Reconectado a la partida.');
});

socket.on('rejoinFailed', () => {
  clearSavedRoom();
  showLobby();
});

socket.on('error', msg => {
  document.getElementById('msg-lobby').innerText = msg;
  setMsg(msg);
});

socket.on('roomUpdate', state => {
  if (!state.started) {
    document.getElementById('waitingPlayers').innerHTML =
      state.players.map(p => `<span style="background:rgba(255,255,255,0.2);border-radius:6px;padding:6px 12px;margin:4px;display:inline-block">${p.name}</span>`).join('');
    updateWaitingTimer(state.turnDurationSeconds);
  }
});

socket.on('gameStarted', state => {
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  boardGroups = [];
  boardGroupsBackup = [];
  handBackup = JSON.parse(JSON.stringify(myHand));
  usedTileIds = [];
  selectedBoardTiles = [];
  waitingForServer = false;
  updateBoard();
  updateHand();
  updatePlayers(state.players, state.currentTurn);
  updatePoolCount(state.poolCount);
  syncTurnTimer(state);
  isMyTurn = state.currentPlayerId === myPlayerId;
  updateTurnUI();
});

socket.on('boardUpdate', state => {
  if (state.started) {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('waiting').style.display = 'none';
    document.getElementById('game').style.display = 'block';
  }

  const hadPendingLocalMove = hasPendingMove();
  const incomingIsMyTurn = state.currentPlayerId === myPlayerId;

  if (hadPendingLocalMove && !waitingForServer && incomingIsMyTurn) {
    updatePlayers(state.players, state.currentTurn);
    updatePoolCount(state.poolCount);
    syncTurnTimer(state);
    isMyTurn = true;
    updateTurnUI();
    return;
  }

  if (hadPendingLocalMove && !waitingForServer) {
    myHand = JSON.parse(JSON.stringify(handBackup));
  }

  boardGroups = state.board;
  boardGroupsBackup = JSON.parse(JSON.stringify(state.board));
  usedTileIds = [];
  selectedTiles = [];
  selectedBoardTiles = [];
  turnInProgress = false;
  waitingForServer = false;
  updateBoard();
  updatePlayers(state.players, state.currentTurn);
  updatePoolCount(state.poolCount);
  syncTurnTimer(state);
  isMyTurn = state.currentPlayerId === myPlayerId;
  if (isMyTurn) {
    handBackup = JSON.parse(JSON.stringify(myHand));
  }
  updateTurnUI();
  updateHand();
});

socket.on('handUpdate', ({ hand }) => {
  myHand = hand;
  if (isMyTurn && !hasPendingMove()) {
    handBackup = JSON.parse(JSON.stringify(myHand));
  }
  updateHand();
});

socket.on('turnError', msg => {
  waitingForServer = false;
  myHand = JSON.parse(JSON.stringify(handBackup));
  boardGroups = JSON.parse(JSON.stringify(boardGroupsBackup));
  usedTileIds = [];
  selectedTiles = [];
  selectedBoardTiles = [];
  turnInProgress = false;
  setMsg(msg);
  playSound('error');
  flashError();
  updateHand();
  updateBoard();
  updateTurnUI();
});

socket.on('turnNotice', ({ message }) => {
  setMsg(message || '');
  playSound('draw');
});

socket.on('gameOver', ({ winner }) => {
  stopTurnTimer();
  playSound('win');
  launchConfetti();
  alert(`🏆 ¡${winner} ganó el juego!`);
  clearSavedRoom();
  showLobby();
});

// --- UI helpers ---
function showWaiting(roomId, isHost) {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('waiting').style.display = 'block';
  document.getElementById('roomCode').innerText = roomId;
  updateWaitingTimer(0);
  const link = `${location.origin}/?room=${roomId}`;
  document.getElementById('link-box').innerText = link;
  if (isHost) {
    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('waitMsg').style.display = 'none';
  }
  // Update URL
  history.replaceState({}, '', `?room=${roomId}`);
}

function tileHTML(tile, extra='') {
  const label = tile.isJoker ? '★' : tile.number;
  return `<div class="tile ${tile.color} ${extra}" data-id="${tile.id}" title="${tile.isJoker?'Comodín':tile.color+' '+tile.number}">${label}</div>`;
}

function updateHand() {
  document.getElementById('handCount').innerText = myHand.filter(t => !t.separator).length;
  const div = document.getElementById('hand');
  div.innerHTML = myHand.map(t => {
    if (t.separator) return '<div class="hand-separator"></div>';
    const sel = selectedTiles.includes(t.id) ? 'selected' : '';
    return tileHTML(t, sel);
  }).join('');
  div.querySelectorAll('.tile').forEach(el => {
    el.onclick = () => toggleSelect(parseInt(el.dataset.id));
  });
  updateSelectedArea();
}

function updateSelectedArea() {
  const totalSelected = selectedTiles.length + selectedBoardTiles.length;
  document.getElementById('selCount').innerText = totalSelected;

  const picked = document.getElementById('pickedFromBoard');
  if (!picked) return;

  if (selectedBoardTiles.length === 0) {
    picked.innerHTML = '';
    return;
  }

  picked.innerHTML = `<span>Levantadas de la mesa:</span>${selectedBoardTiles.map(t => tileHTML(t, 'lifted')).join('')}`;
}

function updateBoard() {
  const div = document.getElementById('board');
  div.innerHTML = boardGroups.map((group, gi) =>
    `<div class="group-on-board" data-gi="${gi}"><span class="group-label">Grupo ${gi + 1}</span>${group.map(t => tileHTML(t,'on-board')).join('')}</div>`
  ).join('');
  div.querySelectorAll('.tile').forEach(el => {
    el.onclick = () => takeBoardTile(parseInt(el.dataset.id));
  });
  updateSelectedArea();
}

function updatePoolCount(count) {
  const el = document.getElementById('poolCount');
  if (el) el.innerText = Number.isFinite(count) ? `Pozo: ${count}` : '';
}

function formatTurnDuration(totalSeconds) {
  const secondsValue = Number(totalSeconds) || 0;
  if (secondsValue <= 0) return 'Sin tiempo por turno';
  const minutes = Math.floor(secondsValue / 60);
  const seconds = secondsValue % 60;
  if (minutes && seconds) return `Tiempo por turno: ${minutes} min ${seconds} seg`;
  if (minutes) return `Tiempo por turno: ${minutes} min`;
  return `Tiempo por turno: ${seconds} seg`;
}

function updateWaitingTimer(totalSeconds) {
  const el = document.getElementById('waitingTimer');
  if (el) el.innerText = formatTurnDuration(totalSeconds);
}

function syncTurnTimer(state) {
  turnDurationSeconds = state.turnDurationSeconds || 0;
  turnEndsAt = state.turnEndsAt || null;
  serverTimeOffset = (state.serverTime || Date.now()) - Date.now();
  renderTurnTimer();
  if (turnDurationSeconds && !timerInterval) {
    timerInterval = setInterval(renderTurnTimer, 250);
  }
  if (!turnDurationSeconds) stopTurnTimer();
}

function stopTurnTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  turnDurationSeconds = 0;
  turnEndsAt = null;
  const el = document.getElementById('turnTimer');
  if (el) {
    el.innerText = '';
    el.classList.remove('warning');
  }
}

function renderTurnTimer() {
  const el = document.getElementById('turnTimer');
  if (!el) return;
  if (!turnDurationSeconds || !turnEndsAt) {
    el.innerText = '';
    el.classList.remove('warning');
    return;
  }
  const remaining = Math.max(0, Math.ceil((turnEndsAt - (Date.now() + serverTimeOffset)) / 1000));
  const minutes = Math.floor(remaining / 60);
  const seconds = remaining % 60;
  el.innerText = `Tiempo: ${minutes}:${String(seconds).padStart(2, '0')}`;
  el.classList.toggle('warning', remaining <= 10);
}

function updatePlayers(players, currentTurn) {
  const me = players.find(p => p.id === myPlayerId);
  myOpened = Boolean(me && me.opened);
  document.getElementById('playersInfo').innerHTML = players.map((p,i) => {
    const offline = p.connected === false;
    return `<div class="player-badge ${i===currentTurn?'active':''} ${offline ? 'offline' : ''}">${p.name} — ${p.handCount} fichas${p.opened?' ✅':''}${offline ? ' - reconectando' : ''}</div>`;
  }).join('');
}

function updateTurnUI() {
  const turnMsg = document.getElementById('turnMsg');
  turnMsg.innerText = isMyTurn ? '🟢 ES TU TURNO' : '⏳ Esperando tu turno...';
  document.getElementById('confirmBtn').disabled = !isMyTurn || waitingForServer;
  document.getElementById('drawBtn').disabled = !isMyTurn || waitingForServer;
  document.getElementById('cancelBtn').disabled = !isMyTurn || waitingForServer;
  const gamePanel = document.querySelector('#game .panel:last-child');
  if (gamePanel) gamePanel.classList.toggle('turn-glow', isMyTurn && !waitingForServer);
  if (!isMyTurn) setMsg('');
}

function setMsg(m) { document.getElementById('msg').innerText = m; }

function toggleSelect(id) {
  if (!isMyTurn) return;
  playSound('select');
  const idx = selectedTiles.indexOf(id);
  if (idx === -1) selectedTiles.push(id);
  else selectedTiles.splice(idx, 1);
  updateHand();
}

function takeBoardTile(id) {
  if (!isMyTurn || waitingForServer) return;
  if (!myOpened) return setMsg('Primero tenés que hacer tu bajada inicial de 30 puntos.');

  for (let gi = 0; gi < boardGroups.length; gi++) {
    const ti = boardGroups[gi].findIndex(tile => tile.id === id);
    if (ti !== -1) {
      const [tile] = boardGroups[gi].splice(ti, 1);
      if (boardGroups[gi].length === 0) boardGroups.splice(gi, 1);
      selectedBoardTiles.push(tile);
      turnInProgress = true;
      playSound('select');
      updateBoard();
      updateSelectedArea();
      setMsg('Ficha levantada de la mesa. Armá un grupo válido antes de confirmar.');
      return;
    }
  }
}

function clearSelection() {
  selectedTiles = [];
  if (selectedBoardTiles.length > 0) {
    boardGroups = JSON.parse(JSON.stringify(boardGroupsBackup));
    selectedBoardTiles = [];
    turnInProgress = usedTileIds.length > 0;
    updateBoard();
  }
  updateHand();
  updateSelectedArea();
}

function hasPendingMove() {
  return usedTileIds.length > 0 || selectedBoardTiles.length > 0 || JSON.stringify(boardGroups) !== JSON.stringify(boardGroupsBackup);
}

function getMissingGroupColor(group, number) {
  const colors = ['red', 'blue', 'yellow', 'black'];
  const usedColors = new Set(group.filter(tile => !tile.isJoker && tile.number === number).map(tile => tile.color));
  return colors.find(color => !usedColors.has(color)) || null;
}

function maybeReplaceGroupJoker(group, tilesToAdd) {
  if (!Array.isArray(group) || group.length !== 4) return false;
  const jokerIndex = group.findIndex(tile => tile.isJoker);
  if (jokerIndex === -1) return false;

  const normalTiles = group.filter(tile => !tile.isJoker);
  if (normalTiles.length !== 3) return false;
  const number = normalTiles[0].number;
  if (!normalTiles.every(tile => tile.number === number)) return false;

  const missingColor = getMissingGroupColor(group, number);
  const replacementIndex = tilesToAdd.findIndex(tile => !tile.isJoker && tile.number === number && tile.color === missingColor);
  if (replacementIndex === -1) return false;

  const [replacement] = tilesToAdd.splice(replacementIndex, 1);
  const [joker] = group.splice(jokerIndex, 1, replacement);
  selectedBoardTiles.push(joker);
  setMsg('Comodín reemplazado. Usalo en otro grupo antes de confirmar.');
  return true;
}

function returnPickedTiles() {
  if (!isMyTurn) return;
  if (selectedBoardTiles.length === 0) return setMsg('No hay fichas levantadas de la mesa.');
  boardGroups = JSON.parse(JSON.stringify(boardGroupsBackup));
  selectedBoardTiles = [];
  turnInProgress = usedTileIds.length > 0;
  updateBoard();
  updateSelectedArea();
  setMsg('Fichas de la mesa devueltas.');
}

function sortBoard() {
  boardGroups = boardGroups.map(group => {
    return [...group].sort((a, b) => {
      if (a.isJoker && !b.isJoker) return 1;
      if (!a.isJoker && b.isJoker) return -1;
      if ((a.number || 0) !== (b.number || 0)) return (a.number || 0) - (b.number || 0);
      const colorOrder = { red: 1, blue: 2, yellow: 3, black: 4, joker: 5 };
      return (colorOrder[a.color] || 99) - (colorOrder[b.color] || 99);
    });
  });
  updateBoard();
  setMsg('Mesa ordenada. El servidor la volverá a ordenar al confirmar.');
}

function tileSortValue(tile) {
  const colorOrder = { red: 1, blue: 2, yellow: 3, black: 4, joker: 5 };
  return [tile.number || 99, colorOrder[tile.color] || 99, tile.id || 0];
}

function compareTiles(a, b) {
  const av = tileSortValue(a);
  const bv = tileSortValue(b);
  return av[0] - bv[0] || av[1] - bv[1] || av[2] - bv[2];
}

function compareByColorThenNumber(a, b) {
  const colorOrder = { red: 1, blue: 2, yellow: 3, black: 4, joker: 5 };
  return (colorOrder[a.color] || 99) - (colorOrder[b.color] || 99) ||
    (a.number || 99) - (b.number || 99) ||
    (a.id || 0) - (b.id || 0);
}

function findNumberSets(tiles) {
  const groups = [];
  const byNumber = new Map();

  tiles.filter(t => !t.isJoker).forEach(tile => {
    if (!byNumber.has(tile.number)) byNumber.set(tile.number, []);
    byNumber.get(tile.number).push(tile);
  });

  [...byNumber.entries()].forEach(([number, numberTiles]) => {
    const uniqueByColor = [];
    const seenColors = new Set();
    numberTiles.sort(compareByColorThenNumber).forEach(tile => {
      if (!seenColors.has(tile.color)) {
        seenColors.add(tile.color);
        uniqueByColor.push(tile);
      }
    });
    if (uniqueByColor.length >= 3) groups.push({ type: 'set', score: 100 + uniqueByColor.length, tiles: uniqueByColor });
  });

  return groups;
}

function findRuns(tiles) {
  const groups = [];
  const byColor = new Map();

  tiles.filter(t => !t.isJoker).forEach(tile => {
    if (!byColor.has(tile.color)) byColor.set(tile.color, []);
    byColor.get(tile.color).push(tile);
  });

  [...byColor.entries()].forEach(([, colorTiles]) => {
    const byNumber = new Map();
    colorTiles.sort(compareTiles).forEach(tile => {
      if (!byNumber.has(tile.number)) byNumber.set(tile.number, tile);
    });

    const numbers = [...byNumber.keys()].sort((a, b) => a - b);
    let run = [];
    numbers.forEach(number => {
      if (run.length === 0 || number === run[run.length - 1] + 1) {
        run.push(number);
      } else {
        if (run.length >= 3) groups.push({ type: 'run', score: 90 + run.length, tiles: run.map(n => byNumber.get(n)) });
        run = [number];
      }
    });
    if (run.length >= 3) groups.push({ type: 'run', score: 90 + run.length, tiles: run.map(n => byNumber.get(n)) });
  });

  return groups;
}

function findNearGroups(tiles) {
  const groups = [];
  const byNumber = new Map();
  const byColor = new Map();

  tiles.filter(t => !t.isJoker).forEach(tile => {
    if (!byNumber.has(tile.number)) byNumber.set(tile.number, []);
    byNumber.get(tile.number).push(tile);
    if (!byColor.has(tile.color)) byColor.set(tile.color, []);
    byColor.get(tile.color).push(tile);
  });

  [...byNumber.values()].forEach(numberTiles => {
    const uniqueColors = [];
    const seenColors = new Set();
    numberTiles.sort(compareByColorThenNumber).forEach(tile => {
      if (!seenColors.has(tile.color)) {
        seenColors.add(tile.color);
        uniqueColors.push(tile);
      }
    });
    if (uniqueColors.length === 2) groups.push({ type: 'pair', score: 40, tiles: uniqueColors });
  });

  [...byColor.values()].forEach(colorTiles => {
    const sorted = colorTiles.sort(compareTiles);
    for (let i = 0; i < sorted.length - 1; i++) {
      const a = sorted[i];
      const b = sorted[i + 1];
      if (b.number - a.number <= 2) groups.push({ type: 'near-run', score: 35, tiles: [a, b] });
    }
  });

  return groups;
}

function sortHandExpert() {
  const tiles = myHand.filter(t => !t.separator);
  const jokers = tiles.filter(t => t.isJoker).sort(compareTiles);
  const normalTiles = tiles.filter(t => !t.isJoker);
  const used = new Set();
  const blocks = [];

  const candidates = [...findNumberSets(normalTiles), ...findRuns(normalTiles)]
    .sort((a, b) => b.score - a.score || b.tiles.length - a.tiles.length);

  candidates.forEach(group => {
    if (group.tiles.every(tile => !used.has(tile.id))) {
      group.tiles.forEach(tile => used.add(tile.id));
      blocks.push(group.tiles.sort(group.type === 'run' ? compareTiles : compareByColorThenNumber));
    }
  });

  const remainingAfterMelds = normalTiles.filter(tile => !used.has(tile.id));
  findNearGroups(remainingAfterMelds)
    .sort((a, b) => b.score - a.score)
    .forEach(group => {
      if (group.tiles.every(tile => !used.has(tile.id))) {
        group.tiles.forEach(tile => used.add(tile.id));
        blocks.push(group.tiles.sort(compareTiles));
      }
    });

  const loose = normalTiles.filter(tile => !used.has(tile.id)).sort(compareTiles);
  if (loose.length > 0) blocks.push(loose);
  if (jokers.length > 0) blocks.push(jokers);

  myHand = blocks.flatMap((block, index) => index === 0 ? block : [{ separator: true }, ...block]);
  selectedTiles = selectedTiles.filter(id => tiles.some(tile => tile.id === id));
  updateHand();
  playSound('confirm');
  setMsg('Tus fichas se ordenaron por jugadas probables.');
}

function addGroupFromSelected() {
  if (!isMyTurn) return;
  const handTiles = myHand.filter(t => !t.separator && selectedTiles.includes(t.id));
  const tiles = [...handTiles, ...selectedBoardTiles];
  if (tiles.length < 3) return setMsg('Seleccioná al menos 3 fichas para formar un grupo');
  boardGroups.push(tiles);
  usedTileIds.push(...selectedTiles);
  myHand = myHand.filter(t => !t.separator && !selectedTiles.includes(t.id));
  selectedTiles = [];
  selectedBoardTiles = [];
  turnInProgress = true;
  playSound('place');
  pulseBoard();
  updateHand();
  updateBoard();
  setMsg('Grupo agregado a la mesa');
}

function addToExistingGroup() {
  if (!isMyTurn) return;
  if (selectedTiles.length + selectedBoardTiles.length === 0) return setMsg('Seleccioná fichas de tu mano o de la mesa primero');
  const gi = prompt('¿A qué grupo querés agregar? (numerados de izquierda a derecha, empezando en 1)');
  const idx = parseInt(gi) - 1;
  if (isNaN(idx) || idx < 0 || idx >= boardGroups.length) return setMsg('Número de grupo inválido');
  const tiles = [...myHand.filter(t => !t.separator && selectedTiles.includes(t.id)), ...selectedBoardTiles];
  const group = boardGroups[idx];
  const replacedJoker = maybeReplaceGroupJoker(group, tiles);
  if (tiles.length > 0) group.push(...tiles);
  usedTileIds.push(...selectedTiles);
  myHand = myHand.filter(t => !t.separator && !selectedTiles.includes(t.id));
  selectedTiles = [];
  if (!replacedJoker) selectedBoardTiles = [];
  turnInProgress = true;
  playSound('place');
  pulseBoard();
  updateHand();
  updateBoard();
  setMsg('Fichas agregadas al grupo');
}

function confirmTurn() {
  if (!isMyTurn) return;
  if (!hasPendingMove()) {
    playSound('error');
    flashError();
    return setMsg('No hiciste ninguna jugada. Tomá una ficha o bajá fichas.');
  }
  waitingForServer = true;
  playSound('confirm');
  updateTurnUI();
  socket.emit('playTurn', { roomId: currentRoomId, board: boardGroups, usedTileIds });
  turnInProgress = false;
}

function drawTile() {
  if (!isMyTurn) return;
  if (hasPendingMove()) {
    playSound('error');
    flashError();
    return setMsg('Ya jugaste fichas. Confirmá o deshacé tu turno.');
  }
  waitingForServer = true;
  playSound('draw');
  updateTurnUI();
  socket.emit('drawTile', { roomId: currentRoomId });
}

function cancelTurn() {
  if (!isMyTurn) return;
  boardGroups = JSON.parse(JSON.stringify(boardGroupsBackup));
  myHand = JSON.parse(JSON.stringify(handBackup));
  selectedTiles = [];
  selectedBoardTiles = [];
  turnInProgress = false;
  usedTileIds = [];
  setMsg('Turno deshecho.');
  updateHand();
  updateBoard();
}

function flashError() {
  const panel = document.querySelector('#game .panel:last-child') || document.getElementById('lobby');
  if (!panel) return;
  panel.classList.remove('shake');
  void panel.offsetWidth;
  panel.classList.add('shake');
}

function pulseBoard() {
  const board = document.getElementById('board');
  if (!board) return;
  board.classList.remove('pulse-board');
  void board.offsetWidth;
  board.classList.add('pulse-board');
}

function launchConfetti() {
  const colors = ['#f0a500', '#e02020', '#1a5fd4', '#00e0a4', '#ffffff'];
  for (let i = 0; i < 90; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = `${Math.random() * 100}vw`;
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = `${Math.random() * 0.6}s`;
    piece.style.transform = `rotate(${Math.random() * 180}deg)`;
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 2600);
  }
}
